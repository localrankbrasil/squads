name: "Pipeline de Landing Page Local Rank"
squad: "landing-page-local-rank"
description: "Recebe uma copy pronta, estrutura a landing, gera tres previews, cria preview final para GitHub Pages e entrega handoff Elementor + Fluent Forms."

steps:
  - step: 1
    file: pipeline/steps/step-01-copy-input.md
    type: checkpoint
    name: "Receber Copy"

  - step: 2
    file: pipeline/steps/step-02-page-structure.md
    type: agent
    agent: lara-arquitetura
    name: "Estruturar Landing"
    execution: inline

  - step: 3
    file: pipeline/steps/step-03-visual-previews.md
    type: agent
    agent: nina-visual
    name: "Gerar 3 Previews"
    execution: inline

  - step: 4
    file: pipeline/steps/step-04-preview-choice.md
    type: checkpoint
    name: "Escolher Direcao Visual"

  - step: 5
    file: pipeline/steps/step-05-github-preview.md
    type: agent
    agent: nina-visual
    name: "Gerar Preview Final"
    execution: inline

  - step: 6
    file: pipeline/steps/step-06-elementor-handoff.md
    type: agent
    agent: diego-elementor
    name: "Gerar Handoff Elementor"
    execution: inline

  - step: 7
    file: pipeline/steps/step-07-quality-review.md
    type: agent
    agent: renata-revisao
    name: "Revisao Final"
    execution: inline
    on_reject: 5

  - step: 8
    file: pipeline/steps/step-08-final-approval.md
    type: checkpoint
    name: "Aprovacao Final"

checkpoints:
  - step: 1
  - step: 4
  - step: 8
