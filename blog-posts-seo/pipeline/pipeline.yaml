name: "Pipeline de Criação de Blog Post SEO"
squad: "blog-posts-seo"
description: "Novo pipeline: 6 steps limpos. Inputs → Redação com 3 playbooks → Validação links → Publicação WordPress → Geração imagem → Interlinks cluster."

steps:
  - step: 1
    file: pipeline/steps/step-01-coleta-inputs.md
    type: agent
    agent: coleta-inputs
    name: "Coleta Interativa de Inputs"
    description: "Coleta inputs estruturados do usuário para blog post (título, keyword, links, contexto cliente, cluster info)"

  - step: 2
    file: pipeline/steps/step-02-redacao-blog-post.md
    type: agent
    agent: redator-pesquisador
    name: "Redação do Blog Post SEO"
    description: "Escreve blog post completo seguindo Blog Post Writer Skill, SEO Playbook, Readability Playbook com 8 passes de revisão"

  - step: 3
    file: pipeline/steps/step-03-validacao-links.md
    type: agent
    agent: validador-links
    name: "Validação de Links Externos"
    description: "Valida todos os links externos, substitui quebrados, verifica formatação HTML"

  - step: 4
    file: pipeline/steps/step-04-publicacao-wordpress.md
    type: agent
    agent: publicador-wordpress
    name: "Publicação no WordPress"
    description: "Publica post no WordPress, configura Yoast SEO (keyword, title, meta), FAQs widget. SEM featured image ainda."
    checkpoint: true
    checkpoint_name: "Aprovação da Publicação"

  - step: 5
    file: pipeline/steps/step-05-geracao-imagem.md
    type: agent
    agent: gerador-imagem
    name: "Geração de Imagem em Destaque"
    description: "Gera imagem ultra-realista 794x529px usando prompt exata, faz upload no WordPress, define como featured image"

  - step: 6
    file: pipeline/steps/step-06-interlinks-cluster.md
    type: agent
    agent: criador-interlinks
    name: "Interlinks nos Posts Antigos do Cluster"
    description: "Atualiza posts antigos do cluster com backlinks para o novo post usando Related Articles"
    checkpoint: true
    checkpoint_name: "Confirmação de Cluster Finalizado"

checkpoints:
  - step: 4
  - step: 6
